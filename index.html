<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>软件工程复习题网页版</title><link rel="stylesheet" href="style.css" /></head><body><header class="app-header"><div><p class="eyebrow">Software Engineering Quiz</p><h1>软件工程复习题</h1><p class="subtitle">选择题 + 填空题 · 自动判分 · 错题回顾</p></div><div class="header-card"><span class="header-card__label">总题数</span><strong id="totalCount">0</strong></div></header><main class="container"><section class="toolbar panel"><div class="tabs" role="tablist" aria-label="题目筛选"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="single">选择题</button><button class="tab" data-filter="blank">填空题</button><button class="tab" data-filter="wrong">错题</button></div><div class="actions"><button id="submitBtn" class="btn btn-primary">提交判分</button><button id="resetBtn" class="btn btn-default">重做</button><button id="toggleAnswerBtn" class="btn btn-default">显示答案</button></div></section><section id="scorePanel" class="score-panel hidden" aria-live="polite"><div class="score-main"><span class="score-label">得分</span><strong id="scoreText">0 / 0</strong></div><div class="score-detail"><span id="singleScore">选择题：0 / 0</span><span id="blankScore">填空题：0 / 0</span><span id="wrongCount">错题：0</span></div></section><section id="quizList" class="quiz-list"></section><section id="emptyState" class="empty-state hidden"> 当前筛选条件下没有题目。 </section></main><button id="backTop" class="back-top" title="回到顶部">↑</button><script src="script.js"></script></body></html>
